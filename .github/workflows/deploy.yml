name: Deploy Lambdas a AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Desplegar lambda api-facturas
        run: |
          zip lambda_api.zip lambda_api.py
          aws lambda update-function-code \
            --function-name api-facturas \
            --zip-file fileb://lambda_api.zip

      - name: Desplegar lambda procesador-facturas
        run: |
          zip lambda_procesador.zip lambda_procesador.py
          aws lambda update-function-code \
            --function-name procesador-facturas \
            --zip-file fileb://lambda_procesador.zip
